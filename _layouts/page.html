---
layout: default
---
<article class="page">
  {% if page.title %}
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
    </header>
  {% endif %}
  <div class="prose">
    {{ content }}
  </div>
</article>
