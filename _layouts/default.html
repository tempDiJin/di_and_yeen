<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body class="layout-{{ page.layout | default: 'default' }}{% if site.hero_image %} has-bg-image{% endif %}"
      {% if site.hero_image %}style="background-image: url('{{ site.hero_image | relative_url }}');"{% endif %}>
  {% if site.hero_image %}<div class="bg-wash" aria-hidden="true"></div>{% endif %}

  {% include header.html %}

  <main class="container">
    {{ content }}
  </main>

  {% include footer.html %}
</body>
</html>
