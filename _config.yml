# Set this to your repository URL once you push it.
# If hosted at username.github.io, leave baseurl empty.
# If hosted at username.github.io/repo-name, set baseurl: "/repo-name"
url: "https://tempDiJin.github.io"
baseurl: "/yeen-and-di"

# Social / contact links shown in the footer (leave blank to hide)
social:
  github: ""
  twitter: ""
  instagram: ""
  email: "xutong.jin@gmail.com"

# Footer quote rotation — one Korean phrase is picked at random on
# each page load. The first entry is also the no-JS fallback.
footer_quotes:
  - "거리는 사람을 멀어지게 하지 않는다. 마음이 멀어지게 할 뿐이다."
  - "서로 다른 시간을 살아도, 같은 마음이면 괜찮다."
  - "함께 만든 기억은 쉽게 사라지지 않는다."
  - "다른 도시, 같은 공간."

# ─── Build settings ───────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/
timezone: America/Los_Angeles

# Pagination on the blog index (requires jekyll-paginate)
paginate: 6
paginate_path: "/blog/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# ─── Collections ──────────────────────────────────────────────────
# Photos and videos are collections so you can add entries
# as individual markdown files in _photos / _videos.
collections:
  photos:
    output: true
    permalink: /photos/:path/
  videos:
    output: true
    permalink: /videos/:path/

# Default front-matter so you don't have to repeat yourself
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "photos"
    values:
      layout: "photo"
  - scope:
      path: ""
      type: "videos"
    values:
      layout: "video"
  - scope:
      path: ""
    values:
      layout: "default"

# Files to exclude from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .github
  - node_modules
