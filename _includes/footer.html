<footer class="site-footer">
  <div class="container site-footer-inner">
    <p class="copyright">© {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
    <p class="social">
      {% if site.social.github != "" %}<a href="https://github.com/{{ site.social.github }}">GitHub</a>{% endif %}
      {% if site.social.twitter != "" %}<a href="https://twitter.com/{{ site.social.twitter }}">Twitter</a>{% endif %}
      {% if site.social.instagram != "" %}<a href="https://instagram.com/{{ site.social.instagram }}">Instagram</a>{% endif %}
      {% if site.social.email != "" %}<a href="mailto:{{ site.social.email }}">Email</a>{% endif %}
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </p>
  </div>
</footer>
